name: Prettier & Lint --fix

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}

permissions:
  contents: read

jobs:
  run:
    name: Should the linter fix? 🤔
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Cache Prettier
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5
        with:
          path: node_modules/.cache/prettier/.prettier-cache
          key: prettier-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm lint:fix
      - run: pnpm chore:format:fix
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # ratchet:actions/create-github-app-token@v3
        # Run even if `pnpm lint:fix` fails
        if: always()
        id: app-token
        with:
          app-id: ${{ secrets.ECOSPARK_APP_ID }}
          private-key: ${{ secrets.ECOSPARK_APP_PRIVATE_KEY }}
      - uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        # Run even if `lint:fix` fails
        if: always()
        id: create-pull-request
        with:
          body: "I ran `pnpm lint:fix` 🧑‍💻"
          branch: actions/lint-fix-if-needed
          commit-message: "chore(lint): fix linter issues 🤖 ✨"
          labels: 🤖 bot
          sign-commits: true
          title: "chore(lint): fix linter issues 🤖 ✨"
          token: ${{ steps.app-token.outputs.token }}

      - name: Enable automerge on Pull Request
        if: steps.create-pull-request.outputs.pull-request-operation == 'created'
        run: gh pr merge --squash --auto "${{ steps.create-pull-request.outputs.pull-request-number }}"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
