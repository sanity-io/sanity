name: Unit tests

on:
  # Build on pushes branches that have a PR (including drafts)
  pull_request:
    # don't overide the defaults of opened, synchronize, and reopened
    # just add labeling to allow for full test suite running
    types: [opened, synchronize, reopened, labeled, unlabeled]
  # Build on commits pushed to branches without a PR if it's in the allowlist
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_code_changes: ${{ steps.changes.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/detect-code-changes
        id: changes

  test:
    timeout-minutes: 60
    name: Test (node ${{ matrix.node }}) - ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
    runs-on: ubuntu-8core
    needs: [check]
    if: needs.check.outputs.has_code_changes == 'true'
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      # we want to know if a test fails on a specific node version
      fail-fast: false
      matrix:
        node: [20, 22, 24]
        experimental: [false]
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
        # include:
        #   - os: windows-latest
        #     node: 16
        #     experimental: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node }}

      - name: Build packages
        run: pnpm build --output-logs=full --log-order=grouped

      - name: Test
        id: test
        run: |
          # Base arguments for all test runs
          ARGS="--test-timeout=60000 --retry 4 --shard=${{ matrix.shardIndex}}/${{ matrix.shardTotal }} --passWithNoTests"
          if [ "${{ matrix.node }}" == "20" ]; then
            # We only gather coverage from a single Node version.
            # We pass in `--reporter=blob` so that we can combine the results from all shards.
            ARGS="$ARGS --coverage --reporter=default --reporter=blob"
          fi
          pnpm test:vitest $ARGS
        env:
          GITHUB_SHARD_IDENTIFIER: ${{ matrix.shardIndex }}-${{ matrix.shardTotal }}

      - name: Upload blob report to GitHub Actions Artifacts
        if: ${{ !cancelled() && matrix.node == '20' }}
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-${{ github.run_id }}-${{ matrix.shardIndex }}
          path: ".vitest-reports/*"
          include-hidden-files: true
          retention-days: 1

  test-status:
    name: "Test Status"
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Check test matrix status
        run: |
          result="${{ needs.test.result }}"
          if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
            echo "Test matrix failed with status: $result"
            exit 1
          fi

  report-coverage:
    if: ${{ !cancelled() && needs.check.outputs.has_code_changes == 'true' }}
    needs: [check, test]
    runs-on: ubuntu-8core
    permissions:
      # Required to put a comment into the pull-request
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: "Download coverage artifacts"
        uses: actions/download-artifact@v8
        with:
          path: .vitest-reports
          pattern: blob-report-${{ github.run_id }}-*
          merge-multiple: true

      - name: Merged report
        id: merge_reports
        continue-on-error: true
        run: |
          pnpm vitest run --merge-reports --coverage

      - name: Report coverage
        if: steps.merge_reports.outcome == 'success'
        uses: davelosert/vitest-coverage-report-action@c0c9b09c93750ee1d8335d14e94ce3d6fc61df50 # v2.11.0
