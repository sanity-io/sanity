packages:
  - dev/*
  - perf/*
  - examples/*
  - scripts
  - e2e
  - packages/@repo/*
  - packages/@sanity/*
  - packages/groq
  - packages/sanity
  - packages/sanity/fixtures/examples/*

allowBuilds:
  '@playwright/browser-chromium': false
  '@swc/core': false
  better-sqlite3: false
  esbuild: false
  lefthook: true
  onnxruntime-node: false
  protobufjs: false
  sharp: false
  unrs-resolver: false

catalog:
  '@optique/core': ^1.1.1
  '@optique/run': ^1.1.1
  '@playwright/test': 1.61.1
  '@rolldown/plugin-babel': ^0.2.3
  '@sanity/client': ^7.24.0
  '@sanity/migrate': ^8.0.0
  '@sanity/telemetry': ^1.1.0
  '@sanity/tsdown-config': ^0.19.6
  '@sanity/ui': ^3.4.0
  '@types/node': ^24.13.2
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3
  '@types/react-is': ^19.2.0
  '@typescript/native-preview': beta
  '@sanity/vanilla-extract-vite-plugin': ^0.2.5
  '@vanilla-extract/css': ^1.21.1
  '@vanilla-extract/dynamic': ^2.1.5
  '@vitejs/plugin-react': ^6.0.3
  '@vitest/browser-playwright': ^4.1.10
  babel-plugin-react-compiler: ^1.0.0
  jsdom: ^29.1.1
  playwright: 1.61.1
  react: ^19.2.7
  react-dom: ^19.2.7
  react-is: ^19.2.7
  rimraf: ^6.1.3
  styled-components: ^6.4.4
  tsdown: ^0.22.13
  vite: ^8.1.5
  vitest: ^4.1.10
  vitest-browser-react: ^2.2.0

dedupePeers: true
linkWorkspacePackages: deep

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@boundaries/elements'
  - '@oxfmt/*'
  - '@oxlint/*'
  - '@oxlint-tsgolint/*'
  - '@vitest/*'
  - '@vite/*'
  - '@vitejs/plugin-react'
  - '@portabletext/*'
  - '@sanity/*'
  - '@yuku-codegen/*'
  - '@yuku-parser/*'
  - '@yuku-toolchain/types'
  - '@types/*'
  - '@typescript/*'
  - '@vanilla-extract/*'
  - '@vercel/stega'
  # Scoped packages of the yuku toolchain used by rolldown-plugin-dts (native codegen/parser
  # bindings plus shared types), they release in lockstep with it (like @oxlint/* for oxlint)
  - '@yuku-codegen/*'
  - '@yuku-parser/*'
  - '@yuku-toolchain/*'
  - 'csstype'
  - 'data-uri-to-buffer@7.0.0'
  - 'eslint-plugin-boundaries'
  - 'get-it'
  - 'get-uri@7.0.0'
  - 'groq-js'
  # lightningcss and its per-platform native bindings (lightningcss-linux-x64-gnu etc.) release
  # in lockstep; @sanity/tsdown-config tracks its latest so builds pick up new bindings together
  - 'lightningcss'
  - 'lightningcss-*'
  - 'oxfmt'
  - 'oxlint'
  - 'oxlint-tsgolint'
  - 'react'
  - 'react-dom'
  - 'react-hook-form'
  - 'react-is'
  - 'react-rx'
  # tsdown and its rolldown/rolldown-plugin-dts/yuku toolchain release frequently and in
  # lockstep, so new releases are often younger than minimumReleaseAge
  - 'rolldown'
  - '@rolldown/*'
  - 'rolldown-plugin-dts'
  - 'sanity-plugin-internationalized-array'
  - 'sanity-plugin-media'
  - 'sanity-plugin-asset-source-unsplash'
  - 'sanity-plugin-utils'
  - 'tsdown'
  # verkit is part of the tsdown toolchain (tsdown dependency since 0.22.12)
  - 'verkit'
  - 'vitest'
  - 'vite'
  # covers yuku-ast/yuku-codegen/yuku-parser, which ship together with rolldown-plugin-dts
  - 'yuku-*'
  - 'web-vitals'

overrides:
  vitest: 'catalog:'

preferWorkspacePackages: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - '@octokit/endpoint@9.0.6'
  - '@octokit/plugin-paginate-rest@9.2.2'
  - '@reduxjs/toolkit@2.9.0 || 2.10.1 || 2.11.0'
  - '@sanity/cli'
  - '@sanity/mutate@0.11.0-canary.4'
  - '@sanity/sdk@2.1.2'
  - '@swc/core@1.13.5'
  - chokidar@4.0.3
  # 5.24.0 got accidental trust-downgrade
  # 3.88.1-typegen-experimental.0 is a dependency of @sanity/sdk
  - groq@5.24.0 || 3.88.1-typegen-experimental.0
  - sanity-plugin-internationalized-array@4.0.8
  - react-redux@9.2.0
  - reselect@5.1.1
  - rxjs@7.8.2
  - semver@5.7.2 || 6.3.1
  - undici@5.29.0
  - undici-types@6.21.0
  - vite@6.4.1
