packages:
  - dev/*
  - perf/*
  - examples/*
  - scripts
  - e2e
  - packages/@repo/*
  - packages/@sanity/*
  - packages/groq
  - packages/sanity
  - packages/sanity/fixtures/examples/*

allowBuilds:
  esbuild: false
  lefthook: true
  unrs-resolver: false

catalog:
  '@playwright/test': 1.61.0
  '@rolldown/plugin-babel': ^0.2.3
  '@sanity/client': ^7.23.0
  '@sanity/migrate': ^7.0.3
  '@sanity/pkg-utils': ^10.5.8
  '@sanity/telemetry': ^1.1.0
  '@sanity/ui': ^3.2.0
  '@types/node': ^24.13.2
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3
  '@types/react-is': ^19.2.0
  '@typescript/native-preview': beta
  '@vanilla-extract/css': ^1.21.0
  '@vanilla-extract/vite-plugin': ^5.2.3
  '@vitejs/plugin-react': ^6.0.2
  '@vitest/browser-playwright': ^4.1.9
  babel-plugin-react-compiler: ^1.0.0
  babel-plugin-styled-components: ^2.3.0
  esbuild-register: ^3.6.0
  jsdom: ^29.1.1
  playwright: 1.61.0
  react: ^19.2.7
  react-dom: ^19.2.7
  react-is: ^19.2.7
  rimraf: ^6.1.3
  styled-components: npm:@sanity/styled-components@^6.1.24
  vite: ^8.0.16
  vitest: ^4.1.9
  vitest-browser-react: ^2.2.0

dedupePeers: true
linkWorkspacePackages: deep

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@oxfmt/*'
  - '@oxlint/*'
  - '@oxlint-tsgolint/*'
  - '@vitest/*'
  - '@vite/*'
  - '@portabletext/*'
  - '@sanity/*'
  - '@types/*'
  - '@typescript/*'
  - '@vanilla-extract/css'
  - '@vanilla-extract/vite-plugin'
  - '@vercel/stega'
  - 'csstype'
  - 'data-uri-to-buffer@7.0.0'
  - 'get-it'
  - 'get-uri@7.0.0'
  - 'groq-js'
  - 'oxfmt'
  - 'oxlint'
  - 'oxlint-tsgolint'
  - 'react'
  - 'react-dom'
  - 'react-is'
  - 'react-rx'
  - 'sanity-plugin-internationalized-array'
  - 'sanity-plugin-hotspot-array'
  - 'sanity-plugin-media'
  - 'sanity-plugin-markdown'
  - 'sanity-plugin-asset-source-unsplash'
  - 'sanity-plugin-mux-input'
  - 'sanity-plugin-utils'
  - 'vitest'
  - 'vite'

overrides:
  # The e2e-ui.yml workflow needs a @sanity/ui related override in the root package.json in order for it's pnpm add -w ./artifacts/sanity-ui-*.tgz to work its magic.
  '@sanity/ui@3': '$@sanity/ui'
  vitest: $vitest

preferWorkspacePackages: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - '@octokit/endpoint@9.0.6'
  - '@octokit/plugin-paginate-rest@9.2.2'
  - '@reduxjs/toolkit@2.9.0 || 2.10.1 || 2.11.0'
  - '@sanity/cli'
  - '@sanity/mutate@0.11.0-canary.4'
  - '@sanity/sdk@2.1.2'
  - '@swc/core@1.13.5'
  - chokidar@4.0.3
  # 5.24.0 got accidental trust-downgrade
  # 3.88.1-typegen-experimental.0 is a dependency of @sanity/sdk
  - groq@5.24.0 || 3.88.1-typegen-experimental.0
  - sanity-plugin-internationalized-array@4.0.8
  - sanity-plugin-mux-input@3.0.0
  - react-redux@9.2.0
  - reselect@5.1.1
  - rxjs@7.8.2
  - semver@5.7.2 || 6.3.1
  - undici@5.29.0
  - undici-types@6.21.0
  - vite@6.4.1
